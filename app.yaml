runtime: python311
entrypoint: uvicorn app.main:app --host 0.0.0.0 --port 8080

env: standard
instance_class: F2

env_variables:
  MODEL_PATH: "models/best_model.pth"
  CLASS_MAP_PATH: "models/class_to_idx.json"
  LOG_LEVEL: "INFO"
  PYTHONUNBUFFERED: "1"

automatic_scaling:
  min_instances: 1
  max_instances: 10
  target_cpu_utilization: 0.65
  target_throughput_utilization: 0.6

handlers:
  - url: /static
    static_dir: app/static
    secure: always

  - url: /.*
    script: auto
    secure: always
    redirect_http_response_code: 301

vpc_access_connector:
  name: "projects/deeplearning-project-495018/locations/us-central1/connectors/app-connector"

inbound_services:
  - warmup
