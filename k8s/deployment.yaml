apiVersion: apps/v1
kind: Deployment
metadata:
  name: dl-classifier
  namespace: default
  labels:
    app: dl-classifier
    version: v1

spec:
  replicas: 2
  selector:
    matchLabels:
      app: dl-classifier
  
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: dl-classifier
        version: v1

    spec:
      serviceAccountName: dl-classifier-sa
      
      containers:
      - name: dl-classifier
        image: europe-west1-docker.pkg.dev/deeplearning-project-495018/dl-repo/dl-api-prod:v4        
        imagePullPolicy: Always
        
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP

        env:
        - name: MODEL_PATH
          value: "models/best_model.pth"
        - name: CLASS_MAP_PATH
          value: "models/class_to_idx.json"
        - name: LOG_LEVEL
          value: "INFO"
        - name: PYTHONUNBUFFERED
          value: "1"

        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 2Gi

        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 2

        volumeMounts:
        - name: models-volume
          mountPath: /app/models
          readOnly: true

      volumes:
      - name: models-volume
        configMap:
          name: model-files
          optional: true

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - dl-classifier
              topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: dl-classifier-svc
  namespace: default
  labels:
    app: dl-classifier

spec:
  type: LoadBalancer
  selector:
    app: dl-classifier

  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dl-classifier-hpa
  namespace: default

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dl-classifier

  minReplicas: 2
  maxReplicas: 10

  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 65

  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75

  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 15

    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dl-classifier-sa
  namespace: default